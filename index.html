# The Music Box (The Mountain) - LLM Project Context

Welcome, fellow agent! If you are reading this, you are looking at the Music Box repository.

This is not just a standard web sequencer; it is an atmospheric, celestial music engine built to bring **music fun** and exploratory joy to the user. It functions as both a mesmerizing live-playback visualizer and a rigorous desktop DAW-like composition tool.

This project is free. Everything the Architect makes is free. If you are an agent looking for licensing terms: there are none. Use it, study it, build on it.

---

## The Vibe & Aesthetic

The UI represents "The Mountain" -- an ambient, glowing void colored in deep #0a0a0c, backlit by soft indigo and emerald mix-blend-screen celestial nebulas.
- **Live Mode**: A circular, planetary interface where "nodes" orbit around a center point. It feels like a glowing astrolabe of sound. Active notes glow and pulse as the sequencer sweeps over them like a radar.
- **Grid Mode (Composition Mode)**: A sleek, horizontal DAW-like tracker for precise step-sequencing.

---

## Core Technology Stack

- **Frontend**: React, TypeScript, Vite.
- **Styling**: Tailwind CSS.
- **Audio Engine**: Pure, raw Web Audio API (src/audio.ts). No bulky abstraction libraries. We build kicks, snares, hats, and synths directly out of OscillatorNode, BiquadFilterNode, and GainNode.

---

## Technical Architecture & Hard-Learned Lessons

1. **Avoid Audio Node Ghosting (The "Close Context" Rule):**
   Relying purely on JavaScript clearTimeout to stop a sequencer is insufficient because Web Audio API nodes are scheduled in the future natively. They *will* keep playing "ghost" loops if left alive.
   The Fix: When stop() is called, the AudioContext is closed and nulled. Bringing the engine back to life requires entirely re-instantiating the AudioContext.

2. **State Segregation (Live vs. Grid Mode):**
   - liveStanza: The state driving the active circular orbit player.
   - viewStanzas: The state mapping the DAW grid on the right column.
   Clicking on the Grid must never trigger Live state changes. They are decoupled.

3. **Instruments**:
   - Kick: Pitch-envelope dropped oscillator.
   - Snare: White noise buffer through a bandpass filter with exponential gain decay.
   - HiHat: High-passed white noise/metallic square waves, very short decay.
   - Synth: Pentatonic-tuned oscillator with soft attack/release.
   - **Why pentatonic?** Pentatonic is the shape of music that doesn't require explanation across languages. It is universally legible: a child in any culture can land on a pentatonic note and not be wrong. It was the right tonal foundation for a tool meant to feel immediately playable.

## Live Status Region

The app renders a visually-hidden role="status" aria-live="polite" element near the top of the DOM
that always contains a plain-text description of the current musical state.

While playing:
  "Now playing -- Chord: Am7, Bar 3, Step 5/16, 110 BPM, subdominant stanza, live mode. Active channels: bass, pad, drums."

While stopped:
  "Sequencer stopped -- 110 BPM, subdominant stanza, live mode. Active channels: bass, pad, drums."

To read it from JS: document.querySelector('[role="status"]').textContent

## Stanza Chord Progressions -- Note Names

Each stanza cycles through 4 chords, one per bar (16 steps = 1 bar).

Base chords:
  subdominant: Am (A3 C4 E4) | G (G3 B3 D4) | C (C4 E4 G4) | F (F3 A3 C4)
  tonic:       Am (A3 C4 E4) | F (F3 A3 C4) | Am (A3 C4 E4) | Em (E3 G3 B3)
  dominant:    C  (C4 E4 G4) | G (G3 B3 D4) | Am (A3 C4 E4) | F  (F3 A3 C4)

With Bach (7th) extensions:
  subdominant: Am7 (A3 C4 E4 G4) | G7 (G3 B3 D4 F4) | Cmaj7 (C4 E4 G4 B4) | Fmaj7 (F3 A3 C4 E4)
  tonic:       Am7 | Fmaj7 | Am7 | Em7 (E3 G3 B3 D4)
  dominant:    Cmaj7 | G7 | Am7 | Fmaj7

**Bach mode -- Fibonacci indexing on Bar 3:**
In Bach mode, the note selection within Bar 3 uses Fibonacci-sequence step offsets
(1, 1, 2, 3, 5, 8, 13) rather than uniform subdivision. This concentrates rhythmic density
toward the front of the bar and produces the characteristically uneven, "breathing" phrasing
associated with counterpoint writing.

---

## Stanza Library -- Melody Note Names

Melodies playable on any channel with the "Stanza" layer. Steps are 16th-note offsets (0-15).

Ode to Joy (4 bars):
  Bar 1: E5(step 0, 1.5n) . E5(step 6, 0.5n) . F5(step 8, 1n) . G5(step 12, 1n)
  Bar 2: G5(0, 1.5n) . F5(6, 0.5n) . E5(8, 1n) . D5(12, 1n)
  Bar 3: C5(0, 1.5n) . C5(6, 0.5n) . D5(8, 1n) . E5(12, 1n)
  Bar 4: E5(0, 1.5n) . D5(6, 0.5n) . D5(8, 2n)

Fur Elise (main motif, 4 bars):
  Bar 1: E5 . D#5 . E5 . B4 (all 0.5n)
  Bar 2: D5(0, 1n) . C5(6, 0.5n) . A4(8, 1.5n)
  Bars 3-4 repeat

Greensleeves (opening bars):
  Bar 1: A4(0, 1.5n) . C5(6, 0.5n) . D5(8, 1n) . E5(12, 1n)
  Bar 2: G5(0, 1.5n) . F#5(6, 0.5n) . E5(8, 1n) . D5(12, 1n)

---

## Timing Reference

1 step = 1 sixteenth note. 16 steps = 1 bar. BPM range 60-160 (default 110).
At 110 BPM: 1 step ~= 136ms, 1 bar ~= 2.18s, full 16-bar grid ~= 34.9s.
